name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-linux:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore UiPath.Caching.slnx

      - name: Build
        run: dotnet build UiPath.Caching.slnx -c Release --no-restore

      - name: Test
        run: dotnet test UiPath.Caching.slnx -c Release --no-build --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-ubuntu-latest
          path: TestResults

      - name: Pack
        run: dotnet pack UiPath.Caching.slnx -c Release --no-build -o packages

      - name: Upload packages
        uses: actions/upload-artifact@v5
        with:
          name: nupkg
          path: packages/*.nupkg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore UiPath.Caching.slnx

      - name: Build
        run: dotnet build UiPath.Caching.slnx -c Release --no-restore

      # Redis-backed integration tests run on the Linux job (service containers are Linux-only).
      # Windows is build-only to validate cross-platform compilation.
