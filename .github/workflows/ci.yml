name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0  # SonarQube Cloud needs full history for new-code / blame

      - name: Setup Java (SonarScanner runtime)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - name: Install SonarScanner
        if: env.SONAR_TOKEN != ''
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarQube Cloud begin
        if: env.SONAR_TOKEN != ''
        run: >
          dotnet sonarscanner begin
          /k:"UiPath_dotnet-caching"
          /o:"ui"
          /d:sonar.token="${{ env.SONAR_TOKEN }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
          /d:sonar.cs.vstest.reportsPaths="**/*.trx"

      - name: Restore
        run: dotnet restore UiPath.Caching.slnx

      - name: Build
        run: dotnet build UiPath.Caching.slnx -c Release --no-restore

      - name: Test
        run: dotnet test UiPath.Caching.slnx -c Release --no-build --logger trx --results-directory TestResults --collect:"XPlat Code Coverage;Format=opencover"

      - name: SonarQube Cloud end
        if: env.SONAR_TOKEN != ''
        run: dotnet sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results-ubuntu-latest
          path: TestResults

      - name: Pack
        run: dotnet pack UiPath.Caching.slnx -c Release --no-build -o packages

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore UiPath.Caching.slnx

      - name: Build
        run: dotnet build UiPath.Caching.slnx -c Release --no-restore

      # Redis-backed integration tests run on the Linux job (service containers are Linux-only).
      # Windows is build-only to validate cross-platform compilation.

  # FOSSA runs as its own parallel job (push to main only) so it doesn't delay the build.
  fossa:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore UiPath.Caching.slnx

      - name: FOSSA scan (license + CVE gate)
        if: env.FOSSA_API_KEY != ''
        uses: fossas/fossa-action@ff70fe9fe17cbd2040648f1c45e8ec4e4884dcf3 # v1.9.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          run-tests: true
