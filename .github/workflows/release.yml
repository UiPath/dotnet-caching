name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce release tag naming policy
        run: |
          re='^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|preview|rc)\.[0-9]+)?$'
          if [[ ! "${GITHUB_REF_NAME}" =~ $re ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is not an allowed release tag. Use vX.Y.Z or vX.Y.Z-{alpha|preview|rc}.N"
            exit 1
          fi
          echo "Tag '${GITHUB_REF_NAME}' matches the release policy."

  release:
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub release
    env:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore UiPath.Caching.slnx

      - name: Build
        run: dotnet build UiPath.Caching.slnx -c Release --no-restore /p:Version=${{ steps.version.outputs.value }}

      - name: Test
        run: dotnet test UiPath.Caching.slnx -c Release --no-build

      - name: FOSSA analyze (upload)
        if: env.FOSSA_API_KEY != ''
        uses: fossas/fossa-action@29693cc50323968e039056be419b32989fc5880c # v2.0.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

      - name: FOSSA test (license + CVE gate)
        if: env.FOSSA_API_KEY != ''
        uses: fossas/fossa-action@29693cc50323968e039056be419b32989fc5880c # v2.0.0
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          run-tests: true

      - name: Pack (validation only — not published or uploaded)
        run: dotnet pack UiPath.Caching.slnx -c Release --no-build -o packages /p:Version=${{ steps.version.outputs.value }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Gated by the protected `nuget` environment (manual approval). Both nuget.org publishing
  # and Azure Key Vault signing authenticate with OIDC (no long-lived secrets): nuget.org via
  # trusted publishing, Key Vault via a federated credential on the signing app.
  publish-nuget:
    needs: release
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: read
      id-token: write  # OIDC tokens for nuget.org trusted publishing and Azure federation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore UiPath.Caching.slnx

      - name: Build
        run: dotnet build UiPath.Caching.slnx -c Release --no-restore /p:Version=${{ steps.version.outputs.value }}

      - name: Pack
        run: dotnet pack UiPath.Caching.slnx -c Release --no-build -o packages /p:Version=${{ steps.version.outputs.value }}

      - name: Sign packages (author signature via Azure Key Vault)
        env:
          KV_URL: ${{ secrets.SIGNING_KEYVAULT_URL }}
          KV_CERT: ${{ secrets.SIGNING_KEYVAULT_CERTIFICATE }}
          KV_TENANT_ID: ${{ secrets.SIGNING_AZURE_TENANT_ID }}
          KV_CLIENT_ID: ${{ secrets.SIGNING_AZURE_CLIENT_ID }}
        run: |
          if [ -z "${KV_URL}" ] || [ -z "${KV_CERT}" ]; then
            echo "::error::Key Vault signing is not configured (SIGNING_KEYVAULT_URL / SIGNING_KEYVAULT_CERTIFICATE); nuget.org requires the registered author signature."
            exit 1
          fi
          # Federated (OIDC) login to Azure -- no client secret leaves GitHub. The runner's
          # short-lived GitHub token is exchanged, through the app's federated credential,
          # for a Key Vault access token scoped to this environment.
          oidc=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r '.value')
          az login --service-principal --username "${KV_CLIENT_ID}" --tenant "${KV_TENANT_ID}" \
            --federated-token "${oidc}" --allow-no-subscriptions >/dev/null
          kv_token=$(az account get-access-token --tenant "${KV_TENANT_ID}" --resource https://vault.azure.net --query accessToken -o tsv)
          dotnet tool install --global NuGetKeyVaultSignTool
          export PATH="${PATH}:${HOME}/.dotnet/tools"
          # RFC 3161 timestamping: the TSA reply is a signed token, so its integrity
          # does not depend on the transport. http is DigiCert's documented endpoint
          # (no https RFC 3161 endpoint is published) and carries only the hash.
          for pkg in packages/*.nupkg; do
            NuGetKeyVaultSignTool sign "${pkg}" \
              --file-digest sha256 \
              --timestamp-rfc3161 http://timestamp.digicert.com \
              --timestamp-digest sha256 \
              --azure-key-vault-url "${KV_URL}" \
              --azure-key-vault-certificate "${KV_CERT}" \
              --azure-key-vault-accesstoken "${kv_token}"
          done

      - name: Authenticate to nuget.org (OIDC trusted publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: dotnet nuget push 'packages/*.nupkg' --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate

  # Internal alpha builds -> UiPath Azure DevOps Artifacts feed (mirrors ServiceCommon).
  # Only -alpha tags, gated by the PUBLISH_INTERNAL repo variable.
  publish-internal:
    needs: release
    runs-on: ubuntu-latest
    if: vars.PUBLISH_INTERNAL == 'true' && contains(github.ref_name, '-alpha')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore UiPath.Caching.slnx

      - name: Build
        run: dotnet build UiPath.Caching.slnx -c Release --no-restore /p:Version=${{ steps.version.outputs.value }}

      - name: Pack
        run: dotnet pack UiPath.Caching.slnx -c Release --no-build -o packages /p:Version=${{ steps.version.outputs.value }}

      - name: Add internal feed source
        run: dotnet nuget add source "$FEED_URL" --name internal
        env:
          FEED_URL: ${{ secrets.AZDO_FEED_URL }}

      - name: Push to internal feed
        run: dotnet nuget push 'packages/*.nupkg' --source internal --api-key az --skip-duplicate
        env:
          NuGetPackageSourceCredentials_internal: Username=az;Password=${{ secrets.AZDO_ARTIFACTS_PAT }}
