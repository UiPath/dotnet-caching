mode: ContinuousDeployment
next-version: 1.0.0
continuous-delivery-fallback-tag: ''
commit-message-incrementing: Disabled
assembly-versioning-format: '{Major}.{Minor}.0'
assembly-file-versioning-format: '{Major}.{Minor}.{Patch}'
assembly-informational-format: '{Major}.{Minor}.0'
branches:
  feature:
    source-branches: ['master','release','develop']
    tag: useBranchName
    increment: None
    is-release-branch: false
  fix:
    regex: 'fix[/-]'
    source-branches: ['master','release','develop']
    tag: useBranchName
    increment: None
    is-release-branch: false
  pull-request:
    tag: PullRequest
    increment: None
    tag-number-pattern: '[/-](?<number>\d+)[-/]'
    is-release-branch: false
  develop:
    tag: 'alpha'
    increment: None
    is-release-branch: false
  master:
    tag: 'beta'
    increment: None
    is-release-branch: false
  release:
    source-branches: ['master','release']
    tag: ''
    increment: None
    is-release-branch: true