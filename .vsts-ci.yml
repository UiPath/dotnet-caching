trigger:
  branches:
    include:
      - develop
      - master
      - release/*
  paths:
    include:
      - Caching/*

pr:
  branches:
    include:
      - develop
      - master
      - release/*
  paths:
    include:
      - Caching/*

variables:
  OrganizationName: UiPath
  BuildDefinitionName: $(Build.DefinitionName)
  GitVersion.SemVer: ''

stages:
  - stage: 'CI'
    jobs:
    - job: BuildAndRunTests
      displayName: Build & Run tests
      pool:
        vmImage: ubuntu-latest
      variables:
        BuildConfiguration: Release
        Solution: "$(Build.SourcesDirectory)/Caching/Caching.slnx"
        ArtifactsOutputPath: Packages
        Build.Repository.Clean: true
        build_counter: $[counter('build_counter_1_0_0', 1)]

      steps:
      # Pinned to gitversion/*@2.0.1 — last 2.x release. Runs on Node 20 (clears the
      # Node 10 EOL warning emitted by v1.x), version range '>=5.2.0 <6.1.0' keeps
      # GitVersion 5.x as the runtime, and the task wrapper does NOT inject the
      # '--roll-forward Major' CLI flag that v3+ adds (which breaks GitVersion 5.x
      # invocations and produces 'undefined' output). Bumping further to @3+ would
      # force GitVersion 6, requiring a config schema migration in GitVersion.yml.
      - task: gitversion/setup@2.0.1
        displayName: 'Setup GitVersion'
        inputs:
          versionSpec: '5.x'

      - task: gitversion/execute@2.0.1
        displayName: 'Execute GitVersion'
        inputs:
          useConfigFile: true
          configFilePath: '$(Build.SourcesDirectory)/Caching/GitVersion.yml'
          # /updateassemblyinfo is delivered via additionalArguments rather than
          # the dedicated input because:
          #   1. GitVersion 5 lists 'updateassemblyinfo' in booleanArguments, so
          #      its argument collector does NOT consume the next token as the
          #      filename. If that next token starts with '/' (as it does for
          #      an absolute Linux path), GitVersion's IsSwitchArgument matches
          #      and the parser treats it as an unknown switch, then throws.
          #   2. The dedicated 'updateAssemblyInfoFilename' input requires the
          #      file to exist relative to the task's CWD (not Build.Sources-
          #      Directory), so a relative path fails the wrapper's fileExists
          #      validation.
          # A relative path inside additionalArguments sidesteps both: the
          # wrapper passes it through verbatim, and GitVersion resolves it
          # against TargetPath ($(Build.SourcesDirectory)).
          additionalArguments: '/updateassemblyinfo Caching/GlobalAssemblyInfo.cs'

      - pwsh: |
          $semVer = $env:GITVERSION_NUGETVERSION
          $buildNumber = "$(Build.BuildNumber)"
          if (("$(Build.SourceBranch)" -match "^refs/heads/release/*") -or ("$(Build.SourceBranch)" -eq "refs/heads/master")) {
            $buildNumber = $semVer + "." + $env:BUILD_COUNTER
          } else {
            $semVer += '-' + $env:BUILD_COUNTER
            $buildNumber += "." + $env:BUILD_COUNTER
          }
          Write-Host "SemVer: $semVer"
          Write-Host "BuildNumber: $buildNumber"
          Write-Host "##vso[build.updatebuildnumber]$buildNumber"
          Write-Host "##vso[task.setvariable variable=PackageVersion;isOutput=true]$semVer"
        name: Versions
        displayName: "Adjust build number to ensure package unique name"

      - pwsh: |
          Write-Host "Variables for current build:"
          Get-ChildItem ENV:*
        displayName: Print variables
        continueOnError: true
        condition: always()

      - task: UseDotNet@2
        displayName: Use .NET 8 SDK
        inputs:
          packageType: sdk
          version: 8.x
          includePreviewVersions: false
          performMultiLevelLookup: true

      - task: UseDotNet@2
        displayName: Use .NET 10 SDK
        inputs:
          packageType: sdk
          version: 10.x
          useGlobalJson: false
          includePreviewVersions: false
          performMultiLevelLookup: true

      - pwsh: |
          if (!(dotnet tool list -g | Where-Object {$_.contains("dotnet-coverage")})){
            dotnet tool install --global dotnet-coverage --version 18.3.1
          } else {
            dotnet tool update --global dotnet-coverage --version 18.3.1
          }

          dotnet --info
          dotnet tool list -g
        displayName: Install dotnet tools
        retryCountOnTaskFailure: 10

      - task: NuGetToolInstaller@0
        displayName: Use NuGet 6.x
        inputs:
          versionSpec: '6.x'

      - task: NuGetAuthenticate@1
        displayName: Authenticate to NuGet

      - task: DotNetCoreCLI@2
        displayName: "Restore Nuget packages"
        inputs:
          command: restore
          restoreArguments: $(Solution)
          feedsToUse: config
          nugetConfigPath: "$(Build.SourcesDirectory)/Caching/NuGet.Config"

      - task: SonarCloudPrepare@4
        inputs:
          SonarCloud: SonarConnection
          organization: ui
          scannerMode: dotnet
          projectKey: UiPath_ServiceCommon-Caching
          projectName: UiPath_ServiceCommon-Caching
          projectVersion: '$(Versions.PackageVersion)'
          extraProperties: |
            sonar.sourceEncoding=UTF-8
            sonar.verbose=false
            sonar.log.level=Info
            sonar.exclusions=**/*AssemblyInfo.cs,**/*.js,**/*.css,**/*.scss,**/*.ts,**/*.json,**/*.config,**/*.resx
            sonar.cs.vscoveragexml.reportsPaths=$(Agent.TempDirectory)/**/coverage.xml
            sonar.cs.file.suffixes=.cs
            sonar.cs.analyzeGeneratedCode=false
            sonar.dotnet.excludeTestProjects=true

      - task: DotNetCoreCLI@2
        displayName: "Build Solution"
        inputs:
          command: build
          projects: $(Solution)
          arguments: >
            --configuration $(BuildConfiguration)
            --no-restore
            --no-incremental
            /p:Company=$(OrganizationName)
            /p:SignAssembly=false
            /p:IgnoreCollectDist=false
            /p:GetVersion=false
            /p:GenerateGitVersionInformation=false
            /p:UpdateVersionProperties=false

      - pwsh: |
          dotnet-coverage collect "dotnet test --verbosity normal" -f xml -o "$(Agent.TempDirectory)/test-results/coverage.xml"
        displayName: 'Run tests'
        workingDirectory: $(Build.SourcesDirectory)/Caching

      - task: SonarCloudAnalyze@4

      - task: SonarCloudPublish@4
        inputs:
          pollingTimeoutSec: '300'

      - task: DotNetCoreCLI@2
        displayName: "Create Package"
        inputs:
          command: pack
          packagesToPack: "**/Caching.*.csproj;"
          versioningScheme: byEnvVar
          versionEnvVar: 'Versions_PackageVersion'
          nobuild: true
          includeSymbols: false
          outputDir: $(ArtifactsOutputPath)
        condition: succeeded()

      - task: PublishBuildArtifacts@1
        displayName: 'Publish Artifact'
        inputs:
          ArtifactName: Caching
          PathtoPublish: "$(Build.SourcesDirectory)/$(ArtifactsOutputPath)"

  - stage: 'FEATURE'
    dependsOn: [ 'CI' ]
    variables:
      NugetPackageVersion: $[ stageDependencies.CI.BuildAndRunTests.outputs['Versions.PackageVersion'] ]
    condition: and(
        succeeded(), 
        ne(variables['Build.SourceBranch'], 'refs/heads/develop'), 
        ne(variables['Build.SourceBranch'], 'refs/heads/master'),
        ne(startsWith(variables['Build.SourceBranch'], 'refs/heads/release'), 'true')
      )
    jobs:
      - deployment: 'PublishPackageToFeature'
        displayName: 'Publish to feature feed'
        environment: FEATURE
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetAuthenticate@1
                  displayName: Authenticate to NuGet

                - task: DotNetCoreCLI@2
                  displayName: 'NuGet push'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)/Caching/*.nupkg'
                    publishVstsFeed: '1d71f16a-8504-4895-a839-687a1a4819d4'

                - pwsh: |
                    $feedId = $env:FeedId
                    $version = $env:NugetPackageVersion
                    $personalAccessToken = $env:PAT
                    Write-Host "FeedId: $feedId"
                    Write-Host "Version: $version"

                    $base64AuthInfo = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$personalAccessToken"))

                    $headers = @{
                        "Authorization" = "Basic $base64AuthInfo"
                        "Content-Type"  = "application/json"
                    }
                    $packages = @()

                    $files = Get-ChildItem -Path "$(Agent.BuildDirectory)/Caching/" -Filter "*.nupkg"

                    foreach ($file in $files) {
                        $fileName = $file.BaseName
                        $match = [regex]::Match($fileName, "^(.*?)(?=\.\d+\.\d+\.\d+-)")
                        # If there is a match, print the result
                        if ($match.Success) {
                            $result = $match.Groups[1].Value
                            Write-Output $result
                            $packages += @{
                                "id" = $result
                                "version" = $version
                            }
                        } else {
                            Write-Output "No match found for $fileName"
                        }
                    }

                    $body = @{
                        "data" = @{
                            "listed" = $false
                        }
                        "operation" = 1
                        "packages" = $packages
                    } | ConvertTo-Json

                    Write-Host "Body: $body"

                    [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
                    $uri = "https://uipath.pkgs.visualstudio.com/_apis/packaging/feeds/$($feedId)/nuget/packagesBatch?api-version=7.1-preview.1"
                    Write-Host "Url: $uri"
                    $response = Invoke-RestMethod -Uri $uri -Method POST -Headers $headers -Body $body  -Verbose
                  displayName: 'Unlist package'
                  env:
                    FeedId: '1d71f16a-8504-4895-a839-687a1a4819d4'
                    PAT: "$(System.AccessToken)"
                    NugetPackageVersion: $(NugetPackageVersion)

  - stage: 'ALPHA'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        eq(variables['Build.SourceBranch'], 'refs/heads/develop') 
      )
    jobs:
      - deployment: 'PublishPackageToAlpha'
        displayName: 'Publish to alpha feed'
        environment: ALPHA
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetAuthenticate@1
                  displayName: Authenticate to NuGet

                - task: DotNetCoreCLI@2
                  displayName: 'NuGet push'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)/Caching/*.nupkg'
                    publishVstsFeed: '1d71f16a-8504-4895-a839-687a1a4819d4'
                

  - stage: 'BETA'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        eq(variables['Build.SourceBranch'], 'refs/heads/master')
      )
    jobs:
      - deployment: 'PublishPackageToBeta'
        displayName: 'Publish to beta feed'
        environment: BETA
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetAuthenticate@1
                  displayName: Authenticate to NuGet

                - task: DotNetCoreCLI@2
                  displayName: 'NuGet push'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)/Caching/*.nupkg'
                    publishVstsFeed: '1d71f16a-8504-4895-a839-687a1a4819d4'

  - stage: 'RELEASE'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release')
      )
    jobs:
      - deployment: 'PublishPackageToRelease'
        displayName: 'Publish to release feed'
        environment: RELEASE
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetAuthenticate@1
                  displayName: Authenticate to NuGet

                - task: DotNetCoreCLI@2
                  displayName: 'NuGet push'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)/Caching/*.nupkg'
                    publishVstsFeed: 'a7f75525-c998-47e3-8aaf-0396542795c9'
