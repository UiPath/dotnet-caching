trigger:
  branches:
    include:
      - develop
      - master
      - release/*
  paths:
    include:
      - Caching/*

pr:
  branches:
    include:
      - develop
      - master
      - release/*
  paths:
    include:
      - Caching/*

resources:
  repositories:
    - repository: sonar
      type: github
      name: UiPath/AzurePipelinesTemplates
      ref: refs/tags/uipath.sonar-coverage.1.3.0
      endpoint: 'UiPath'

variables:
  OrganizationName: UiPath
  BuildDefinitionName: $(Build.DefinitionName)
  ProjectShortName: Caching
  ProjectName: Caching
  GitVersion.SemVer: ''

stages:
  - stage: 'CI'
    jobs:
    - job: BuildCachingLibrary
      displayName: Caching - Build & Run tests
      pool:
        vmImage: ubuntu-latest
      variables:
        BuildConfiguration: Release
        Solution: "$(Build.SourcesDirectory)/Caching/Caching.sln"
        ArtifactsOutputPath: Packages
        Build.Repository.Clean: true
        build_counter: $[counter('build_counter_1_0_0', 1)]

      steps:
      - task: gitversion/setup@0
        displayName: 'Setup GitVersion'
        inputs:
          versionSpec: '5.x'
      
      - task: gitversion/execute@0
        displayName: 'Execute GitVersion'
        inputs:
          runtime: 'core'
          useConfigFile: true
          configFilePath: '$(Build.SourcesDirectory)/Caching/GitVersion.yml'
          additionalArguments: '/output json /output buildserver /updateassemblyinfo \"$(Build.SourcesDirectory)/Caching/GlobalAssemblyInfo.cs\"'

      - pwsh: |
          $nugetVersion= $env:GITVERSION_NUGETVERSION + '-' + $env:BUILD_COUNTER.PadLeft(4,'0')
          Write-Host $nugetVersion 
          Write-Host "##vso[task.setvariable variable=GitVersion.NuGetVersion;]$nugetVersion"
          Write-Host '##vso[build.updatebuildnumber]$(Build.BuildNumber).$(build_counter)'
        displayName: "Adjust build number to ensure package unique name"
        condition: not(startsWith(variables['Build.SourceBranch'], 'refs/heads/release'))

      - pwsh: |
          Write-Host "Variables for current build:"
          Get-ChildItem ENV:*
        displayName: Print variables
        continueOnError: true
        condition: always()

      - task: UseDotNet@2
        displayName: Use .NET 6 SDK
        inputs:
          packageType: sdk
          version: 6.x
          includePreviewVersions: false
          performMultiLevelLookup: true

      - task: UseDotNet@2
        displayName: Use .NET 7 SDK
        inputs:
          packageType: sdk
          version: 7.x
          includePreviewVersions: false
          performMultiLevelLookup: true

      - task: UseDotNet@2
        displayName: Use .NET 8 SDK
        inputs:
          packageType: sdk
          useGlobalJson: true
          includePreviewVersions: false
          performMultiLevelLookup: true
          
      - task: NuGetToolInstaller@0
        displayName: Use NuGet 6.x
        inputs:
          versionSpec: '6.x'

      - task: NuGetAuthenticate@1
        displayName: Authenticate to NuGet

      - task: NuGetCommand@2
        displayName: "Restore Nuget packages"
        inputs:
          command: restore
          restoreSolution: $(Solution)
          feedsToUse: config
          nugetConfigPath: "$(Build.SourcesDirectory)/Caching/NuGet.Config"

      - template: /Sonar/prepare-sonar-coverage.yml@sonar
        parameters:
          projectKey: 'UiPath_ServiceCommon-Caching'
          serviceConnectionName: SonarConnection
          runsettingsFile: "$(Build.SourcesDirectory)/Caching/CodeCoverage.runsettings"

      - task: DotNetCoreCLI@2
        displayName: "Build Solution"
        inputs:
          command: build
          projects: $(Solution)
          arguments: >
            --configuration $(BuildConfiguration)
            --no-restore
            /p:Company=$(OrganizationName)
            /p:SignAssembly=false
            /p:IgnoreCollectDist=false
            /p:GetVersion=false
            /p:GenerateGitVersionInformation=false
            /p:UpdateVersionProperties=false

      - task: DotNetCoreCLI@2
        displayName: 'Run tests'
        inputs:
          command: test
          projects: |
            Caching/**/Caching.Tests.csproj
          arguments: '--collect "Code coverage" --logger trx --configuration $(BuildConfiguration)'

      - template: /Sonar/analyze-sonar-coverage.yml@sonar

      - template: /Sonar/publish-sonar-coverage.yml@sonar

      - task: DotNetCoreCLI@2
        displayName: "Create Package"
        inputs:
          command: pack
          packagesToPack: "**/Caching.*.csproj;"
          versioningScheme: byEnvVar
          versionEnvVar: 'GitVersion.NuGetVersion'
          nobuild: true
          includeSymbols: false
          outputDir: "$(ArtifactsOutputPath)"
          configurationToPack: "$(BuildConfiguration)"
        condition: succeeded()

      - task: PublishBuildArtifacts@1
        displayName: 'Publish Artifact: UiPath.Platform.Caching'
        inputs:
          ArtifactName: Caching
          PathtoPublish: "$(Build.SourcesDirectory)/$(ArtifactsOutputPath)"

  - stage: 'FEATURE'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        ne(variables['Build.SourceBranch'], 'refs/heads/develop'), 
        ne(variables['Build.SourceBranch'], 'refs/heads/master'),
        ne(startsWith(variables['Build.SourceBranch'], 'refs/heads/release'), 'true')
      )
    jobs:
      - deployment: 'PublishPackageToFeature'
        displayName: 'Publish package to feature feed'
        environment: FEATURE
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetCommand@2
                  displayName: 'NuGet push - UiPath.Platform.Caching'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)/Caching/*.nupkg'
                    publishVstsFeed: '1d71f16a-8504-4895-a839-687a1a4819d4'

  - stage: 'ALPHA'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        eq(variables['Build.SourceBranch'], 'refs/heads/develop') 
      )
    jobs:
      - deployment: 'PublishPackageToAlpha'
        displayName: 'Publish package to alpha feed'
        environment: ALPHA
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetCommand@2
                  displayName: 'NuGet push - UiPath.Platform.Caching'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)/Caching/*.nupkg'
                    publishVstsFeed: '1d71f16a-8504-4895-a839-687a1a4819d4'

  - stage: 'BETA'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        eq(variables['Build.SourceBranch'], 'refs/heads/master')
      )
    jobs:
      - deployment: 'PublishPackageToBeta'
        displayName: 'Publish package to beta feed'
        environment: BETA
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetCommand@2
                  displayName: 'NuGet push - UiPath.Platform.Caching'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)/Caching/*.nupkg'
                    publishVstsFeed: '1d71f16a-8504-4895-a839-687a1a4819d4'

  - stage: 'RELEASE'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release')
      )
    jobs:
      - deployment: 'PublishPackageToRelease'
        displayName: 'Publish package to release feed'
        environment: RELEASE
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetCommand@2
                  displayName: 'NuGet push - UiPath.Platform.Caching'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)/Caching/*.nupkg'
                    publishVstsFeed: 'a7f75525-c998-47e3-8aaf-0396542795c9'
