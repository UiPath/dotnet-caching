trigger:
  branches:
    include:
      - develop
      - master
      - release/*
  paths:
    include:
      - Caching/*

pr:
  branches:
    include:
      - develop
      - master
      - release/*
  paths:
    include:
      - Caching/*

variables:
  OrganizationName: "uipath"
  BuildDefinitionName: $(Build.DefinitionName)
  ProjectShortName: "Caching"
  ProjectName: "Caching"
  GitVersion.SemVer: ''
  build_counter: $[counter('build_counter_1_0_0', 1)]

stages:
  - stage: 'CI'
    
    jobs:
    - job: BuildCachingLibrary
      displayName: Caching - Build & Run tests
      pool:
        vmImage: windows-2022
        demands:
          - msbuild
          - visualstudio
      variables:
        BuildConfiguration: "Release"
        BuildPlatform: "Any CPU"
        MSBuildArguments: "/p:DeployOnBuild=True;PublishProfile=local /p:GetVersion=false /p:GenerateGitVersionInformation=false /p:UpdateVersionProperties=false"
        Solution: "$(Build.SourcesDirectory)\\Caching\\Caching.sln"
        VSVersion: "17.0"
        ArtifactsOutputPath: "Packages"
        Build.Repository.Clean: true

      steps:
      - task: UseGitVersion@5
        displayName: gitversion
        inputs:
          versionSpec: '5.10.3'
          useConfigFile: true
          configFilePath: '$(Build.SourcesDirectory)\\Caching\\GitVersion.yml'
          updateAssemblyInfoFilename: '$(Build.SourcesDirectory)\\Caching\\GlobalAssemblyInfo.cs'
          updateAssemblyInfo: true

      - powershell: |
          $nugetVersion= $env:GITVERSION_NUGETVERSION + '-' + $(Build.BuildId)
          Write-Host $nugetVersion 
          Write-Host "##vso[task.setvariable variable=GitVersion.NuGetVersion;]$nugetVersion"
        displayName: "Adjust build number to ensure package unique name"
        condition: not(startsWith(variables['Build.SourceBranch'], 'refs/heads/release'))

      - powershell: |
          Write-Host "Variables for current build:"
          Get-ChildItem ENV:*
        displayName: "Print variables"
        continueOnError: true
        condition: always()

      - task: NuGetToolInstaller@0
        displayName: "Use NuGet 6.x"
        inputs:
          versionSpec: '6.x'

      - task: NuGetAuthenticate@0
        displayName: Authenticate to NuGet

      - task: NuGetCommand@2
        displayName: "Restore Nuget packages"
        inputs:
          command: 'restore'
          restoreSolution: "$(Solution)"
          feedsToUse: "config"

      - task: VSBuild@1
        displayName: "Build Solution"
        inputs:
          solution: "$(Solution)"
          vsVersion: "$(VSVersion)"
          msbuildArgs: "$(MSBuildArguments)"
          platform: "$(BuildPlatform)"
          configuration: "$(BuildConfiguration)"
          clean: true
          maximumCpuCount: true

      - task: VisualStudioTestPlatformInstaller@1
        displayName: "Install Visual Studio Test Platform"
        condition: succeeded()

      - task: VSTest@2
        displayName: "Run tests"
        inputs:
          testAssemblyVer2: "**\\*Tests.dll\n!**\\obj\\**"
          testRunTitle: "Unit Tests"
          platform: "$(BuildPlatform)"
          configuration: "$(BuildConfiguration)"
          searchFolder: "$(Build.SourcesDirectory)\\Caching"
          vsTestVersion: toolsInstaller
          codeCoverageEnabled: true
        condition: succeeded()

      - task: DotNetCoreCLI@2
        displayName: "Create Package"
        inputs:
          command: "pack"
          packagesToPack: "**/Caching.*.csproj;"
          versioningScheme: byEnvVar
          versionEnvVar: 'GitVersion.NuGetVersion'
          nobuild: "true"
          includeSymbols: "false"
          outputDir: "$(ArtifactsOutputPath)"
          configurationToPack: "$(BuildConfiguration)"
        condition: succeeded()

      - task: PublishBuildArtifacts@1
        displayName: 'Publish Artifact: UiPath.Platform.Caching'
        inputs:
          ArtifactName: Caching
          PathtoPublish: "$(Build.SourcesDirectory)\\$(ArtifactsOutputPath)"

  - stage: 'FEATURE'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        ne(variables['Build.SourceBranch'], 'refs/heads/develop'), 
        ne(variables['Build.SourceBranch'], 'refs/heads/master'),
        ne(startsWith(variables['Build.SourceBranch'], 'refs/heads/release'), 'true')
      )
    jobs:
      - deployment: 'PublishPackageToFeature'
        displayName: 'Publish package to feature feed'
        environment: FEATURE
        pool:
          vmImage: windows-2022
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetCommand@2
                  displayName: 'NuGet push - UiPath.Platform.Caching'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)\Caching\*.nupkg'
                    publishVstsFeed: '1d71f16a-8504-4895-a839-687a1a4819d4'           

  - stage: 'ALPHA'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        eq(variables['Build.SourceBranch'], 'refs/heads/develop') 
      )
    jobs:
      - deployment: 'PublishPackageToAlpha'
        displayName: 'Publish package to alpha feed'
        environment: ALPHA
        pool:
          vmImage: windows-2022
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetCommand@2
                  displayName: 'NuGet push - UiPath.Platform.Caching'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)\Caching\*.nupkg'
                    publishVstsFeed: '1d71f16a-8504-4895-a839-687a1a4819d4'  

  - stage: 'BETA'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        eq(variables['Build.SourceBranch'], 'refs/heads/master')
      )
    jobs:
      - deployment: 'PublishPackageToBeta'
        displayName: 'Publish package to beta feed'
        environment: BETA
        pool:
          vmImage: windows-2022
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetCommand@2
                  displayName: 'NuGet push - UiPath.Platform.Caching'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)\Caching\*.nupkg'
                    publishVstsFeed: '1d71f16a-8504-4895-a839-687a1a4819d4'  

  - stage: 'RELEASE'
    dependsOn: [ 'CI' ]
    condition: and(
        succeeded(), 
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release')
      )
    jobs:
      - deployment: 'PublishPackageToRelease'
        displayName: 'Publish package to release feed'
        environment: RELEASE
        pool:
          vmImage: windows-2022
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetCommand@2
                  displayName: 'NuGet push - UiPath.Platform.Caching'
                  inputs:
                    command: push
                    packagesToPush: '$(Agent.BuildDirectory)\Caching\*.nupkg'
                    publishVstsFeed: 'a7f75525-c998-47e3-8aaf-0396542795c9'
                    